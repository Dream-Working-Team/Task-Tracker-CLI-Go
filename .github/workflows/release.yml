name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: task-cli-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: task-cli-linux-arm64
          - goos: windows
            goarch: amd64
            artifact_name: task-cli-windows-amd64.exe
          - goos: darwin
            goarch: arm64
            artifact_name: task-cli-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X task-cli/cmd.Version=${VERSION}" -o "dist/${{ matrix.artifact_name }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

      - name: Attach binary to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
